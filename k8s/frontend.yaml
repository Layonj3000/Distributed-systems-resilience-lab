apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: distributed-systems-resilience-lab-frontend:latest

        imagePullPolicy: Never

        env:
        - name: ORDER_SERVICE_URL
          value: http://order-service:8001

        ports:
        - containerPort: 8000

---
apiVersion: v1
kind: Service

metadata:
  name: frontend

spec:
  type: NodePort

  selector:
    app: frontend

  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30080