apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos

metadata:
  name: stress-cpu-order-service
  namespace: default

spec:
  mode: all

  selector:
    namespaces:
      - default
    labelSelectors:
      app: order-service

  stressors:
    cpu:
      workers: 2
      load: 100

  duration: "120s"
