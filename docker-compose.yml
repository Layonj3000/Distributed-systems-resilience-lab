services:

  postgres:
    image: postgres:17

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders_db

    ports:
      - "5432:5432"

  order-service:
    build: ./order-service

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/orders_db

    depends_on:
      - postgres

    ports:
      - "8001:8001"

  frontend:
    build: ./frontend

    environment:
      ORDER_SERVICE_URL: http://order-service:8001

    depends_on:
      - order-service

    ports:
      - "8000:8000"